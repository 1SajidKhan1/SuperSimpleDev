<!DOCTYPE html>
<html>

<head>
  <title>To-Do List</title>

  <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
        font-family: Montserrat, sans-serif;
      }

      body {
        padding: 20px;
      }

      header {
        background: lightblue;
        padding: 10px 20px;
      }

      main {
        background: rgb(46, 200, 211);
        padding: 20px;
      }

      input {
        padding: 10px;
        font-size: 15px;
        border: 1px solid black;
      }

      button {
        padding: 10px;
        font-size: 15px;
        border: 1px solid black;
        background: white;
        cursor: pointer;
      }

      #add-task-button {
        background: lightgreen;
      }

      .delete-btn {
        background: rgb(255, 143, 143);
      }

      #task-form {
        display: grid;
        grid-template-columns: 2fr 1fr 0.6fr;
        gap: 10px;
      }

      #task-list  li{
        list-style: none;
        display: grid;
        grid-template-columns: 2fr 1fr 0.6fr;
        gap: 10px;
        margin: 10px 0;
      }
    </style>
</head>

<body>
  <header>
    <h1>To-Do List</h1>
  </header>

  <main>

    <div id="task-form">
      <input type="text" id="task-name" placeholder="Enter a task here" required>
      <input type="date" id="task-date" required>
      <button id="add-task-button">Add Task</button>
    </div>

    <div id="task-container">
      <ul id="task-list"></ul>
    </div>
  </main>

  <script>
    const tasks = JSON.parse(localStorage.getItem('tasks')) || [];

    const taskName = document.getElementById('task-name');
    const taskDate = document.getElementById('task-date');
    const taskList = document.getElementById('task-list');
    
    const addBtn = document.getElementById('add-task-button');

    renderTasks();

    addBtn.addEventListener('click', () => {
      addTask();
      renderTasks();
    });

    function addTask() {
      const taskValue = taskName.value;
      const dateValue = taskDate.value;

      if (taskValue && dateValue) {
        tasks.push({name: taskValue, date: dateValue});
        localStorage.setItem('tasks', JSON.stringify(tasks));
        taskName.value = '';
        taskDate.value = '';
      } else {
        alert('Please enter both task name and date.');
      }
    }

    function renderTasks() {
      taskList.innerHTML = '';

      tasks.forEach((task, index) => {
        const li = document.createElement('li');
        li.innerHTML = `
        <p>${task.name}</p>
        <p>${task.date}</p>
        <button class="delete-btn">Delete</button>
        `;
        taskList.appendChild(li);

        const deleteBtn = li.querySelector('.delete-btn');
        deleteBtn.addEventListener('click', () => {
          deleteTask(index);
        })
      });
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      localStorage.setItem('tasks', JSON.stringify(tasks));
      renderTasks();
    }
  </script>
</body>

</html>

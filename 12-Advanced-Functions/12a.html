<!DOCTYPE html>
<html lang="en">

<head>
  <title>Advanced Functions</title>
</head>

<body>
  <!-- Create a variable called 'add' and save a function inside. This function will console.log(2 + 3); Run the function twice. -->

  <script>
    let add = () => {
      console.log(2 + 3);
    }
    add();
    add();
  </script>
</body>

</html>

<!DOCTYPE html>

<html lang="en">

<head>
  <title>Exercise</title>
</head>

<body>
  <!-- 
  
  Create an arrow function called 'multiply' that takes 2 numbers, multiplies them together, and returns the result.

  -> multiply(2, 3) => 6
  -> multiply(7, 10) => 70
  
  -->

  <!-- 
  
  Continuing from exercise 12j, write the arrow function on one line.
  
  -->

  <!-- 
  
  Create a function countPositive(nums) that takes an array of numbers and returns how many numbers in the array are greater than 0. Create this function using .forEach() instead of a loop.

  -> countPositive([1, -3, 5]) => 2
  -> countPositive([-2, 3, -5, 7, 10]) => 3
  
  -->

  <!-- 
  
  Create a function addNum(array, num) that takes an array of numbers and returns an array where each number is increased by 'num'. Create this function using .map() instead of a loop.

  -> addNum([1, 2, 3], 2) => [3, 4, 5]
  -> addNum([-2, -1, 0, 99], 2) => [0, 1, 2, 101]

  Bonus: try to use the one-line shortcut in your solution.
  
  -->

  <!-- 
  
  Create a function removeEgg(foods) that takes an array of strings and returns an array where the string 'egg' is removed. Create this function using .filter() instead of a loop.

  -> removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']) => ['apple', 'ham']
  
  -->

  <!-- 
  
  Update exercise 12n to only remove the first 2 eggs from the array.
  Again, use .filter() instead of a loop

  -> removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']) => ['apple', 'egg', 'ham']
  
  -->

  <!-- 
  
  
  
  -->

  <script>
    const multiply = (num1, num2) => num1 * num2;

    console.log(multiply(2, 3));
    console.log(multiply(7, 10));

    function countPositive(nums) {
      let count = 0;
      nums.forEach((value, index) => {
        if (value >= 0) {
          count++;
        }
      });
      console.log(count);
    }
    countPositive([1, -3, 5]);
    countPositive([-2, 3, -5, 7, 10]);

    function addNum(array, num) {
      console.log(array.map((value, index) => value + num));
    }
    addNum([1, 2, 3], 2);
    addNum([-2, -1, 0, 99], 2);

    function removeEgg(foods) {
      console.log(foods.filter((value, index) => value !== 'egg'));
    }
    removeEgg(['egg', 'apple', 'egg', 'egg', 'ham']);
    
    function removeFirstTwoEggs(foods) {
      let count = 0;
      console.log(foods.filter((value, index) => {
        if (count < 2 && value === 'egg') {
          count++;
          return false;
        } else {
          return true;
        }
      }));
    }
    removeFirstTwoEggs(['egg', 'apple', 'egg', 'egg', 'ham']);
  </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <title>Document</title>
</head>

<body>
  <!-- Continuing from excercise 12a, create a function runTwice(fun) that takes a function (as a parameter) and runs it twice.
   
  runTwice(function() {console.log('12b');}); => console.log('12b') twice
  
  runTwice(add); => console.log(5) twice-->

  <script>
    let add = () => {
      console.log(2 + 3);
    }

    add();
    add();

    function runTwice(fun) {
      fun();
      fun();
    }

    runTwice(() => {
      console.log('12b');
    })

    runTwice(add);

  </script>
</body>

</html>

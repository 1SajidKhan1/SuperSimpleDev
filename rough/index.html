<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  
  <script>
    const arr = [1, -3, 6, 8, -2, 4, -1];
    const positiveArr = arr.filter((num, index) => {
      return num % 2 === 0;
    });

    const negativeArr = arr.filter((num, index) => {
      return num % 2 !== 0;
    });

    console.log(arr);
    console.log(positiveArr);
    console.log(negativeArr);

    console.log(arr.map((num, index) => {
      return num * 2;
    }))
  </script>
</body>
</html>
